# Mantém o projeto Supabase free acordado (pausa após ~7 dias sem atividade).
# Um SELECT via REST conta como atividade; RLS devolve lista vazia pro anon — ok.
name: supabase-keepalive
on:
  schedule:
    - cron: "17 3 */2 * *"   # a cada 2 dias, 03:17 UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping REST
